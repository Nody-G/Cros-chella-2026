<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Single bold tent — simple triangle -->
  <polygon points="256,100 120,380 392,380" fill="url(#gold)"/>

  <!-- Tent entrance (dark arch) -->
  <ellipse cx="256" cy="380" rx="55" ry="70" fill="#1a0a3e"/>

  <!-- Small flag on top -->
  <line x1="256" y1="100" x2="256" y2="60" stroke="#ffd700" stroke-width="6" stroke-linecap="round"/>
  <polygon points="256,60 256,85 285,72" fill="#ffd700"/>

  <!-- Single star top-right -->
  <circle cx="380" cy="120" r="12" fill="#ffd700" opacity="0.9"/>
</svg>
